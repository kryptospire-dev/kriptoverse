services:
  - type: web
    name: minati-vault-bot
    env: python
    region: oregon
    plan: free
    
    # Add runtime specification to force Python 3.11
    runtime: python-3.11
    
    buildCommand: |
      echo "🐍 Python version: $(python --version)"
      echo "📂 Current directory: $(pwd)"
      echo "📋 Files present: $(ls -la)"
      
      # Force Python 3.11 compatibility
      python -c "import sys; print(f'Python version: {sys.version}')"
      if [[ $(python --version 2>&1 | grep -o "3\.1[3-9]") ]]; then
        echo "⚠️ Python 3.13+ detected, ensuring compatibility..."
      fi
      
      python -m pip install --upgrade pip setuptools wheel
      echo "📦 Installing requirements..."
      python -m pip install -r requirements.txt
      echo "✅ Dependencies installed successfully"
      echo "📦 Installed packages:"
      python -m pip list | head -20
      
      # Verify Firebase Admin SDK installation
      python -c "import firebase_admin; print(f'Firebase Admin SDK: {firebase_admin.__version__}')" || echo "❌ Firebase SDK not found"

    startCommand: |
      echo "🚀 Starting Minati Vault Bot..."
      echo "🐍 Python: $(python --version)"
      echo "📦 Total packages: $(pip list | wc -l)"
      echo "🔥 Firebase Admin SDK: $(python -c 'import firebase_admin; print(firebase_admin.__version__)' 2>/dev/null || echo 'Not found')"
      echo "🤖 Python Telegram Bot: $(python -c 'import telegram; print(telegram.__version__)' 2>/dev/null || echo 'Not found')"
      echo "🌍 Environment: ${ENVIRONMENT:-production}"
      echo "🆔 Firebase Project: ${FIREBASE_PROJECT_ID:-not_set}"
      echo "🔑 Bot Token Length: ${#BOT_TOKEN}"
      echo "🔐 Service Account JSON Length: ${#FIREBASE_SERVICE_ACCOUNT_JSON}"
      
      # Debug Firebase credentials
      if [[ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]]; then
        echo "✅ Firebase service account JSON is set"
        # Test JSON validity without exposing content
        python -c "import json, os; json.loads(os.getenv('FIREBASE_SERVICE_ACCOUNT_JSON')); print('✅ JSON is valid')" || echo "❌ JSON is invalid"
      else
        echo "❌ Firebase service account JSON not set"
      fi
      
      python main.py

    envVars:
      # Force Python 3.11 (though runtime specification above is preferred)
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENVIRONMENT
        value: production
        
      # Required bot configuration
      - key: BOT_TOKEN
        sync: false
      - key: CUSTOMER_CARE_USERNAME
        sync: false
        
      # Firebase configuration (this is the critical fix)
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: kriptospire
        
      # Additional debugging
      - key: DEBUG_FIREBASE
        value: "true"
